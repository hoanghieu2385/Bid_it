# Project name
name: mobile_app

# Project description
description: "A new Flutter project."

# Prevents accidental publishing to pub.dev
publish_to: 'none'

# Application version
version: 1.0.0+1

# Dart SDK constraints
environment:
  sdk: ^3.7.2

# Dependencies required for the application
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^2.30.0
  firebase_auth: ^4.17.0
  intl: ^0.19.0
  http: ^0.13.6
  cupertino_icons: ^1.0.8
  permission_handler: ^11.0.1
  device_info_plus: ^9.0.3
  animated_notch_bottom_bar: ^1.0.3
  convex_bottom_bar: ^3.0.0
  cloud_firestore: ^4.17.5
  shared_preferences: ^2.5.3
  lucide_icons: ^0.257.0
  image_picker: ^1.1.2
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.2.1
  flutter_launcher_icons: ^0.14.3
  #websocket
  stomp_dart_client: ^0.4.4
  web_socket_channel: ^2.4.0
  http_parser: ^4.0.2
  share_plus: ^10.0.0

  url_launcher: ^6.2.5
  url_launcher_windows: ^3.0.0
  flutter_markdown: ^0.7.7+1
  google_fonts: ^4.0.4
  shimmer: ^3.0.0
  flutter_paypal: ^0.2.0
  auto_size_text: ^3.0.0


# Development and testing dependencies
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.3.10
# Flutter-specific configurations
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/logo.png
flutter_native_splash:
  color: "#FFFFFF"
  image_path: assets/icon/logo.png
  image : assets/icon/logo.png
  android: true
  ios: true



