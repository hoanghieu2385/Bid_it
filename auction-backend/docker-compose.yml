services:
  mysql:
    image: mysql:8.0
    ports:
      - "3308:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=123456
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --bind-address=0.0.0.0
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 15s
      timeout: 7s
      retries: 10
    networks:
      - auction-network
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=mysql
      - PMA_USER=root
      - PMA_PASSWORD=123456
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - auction-network
    restart: unless-stopped

  discovery-service:
    build:
      context: ./discovery-service
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    networks:
      - auction-network
    restart: unless-stopped
    healthcheck: 
      test: ["CMD", "curl", "-f", "http://localhost:8761"]
      interval: 15s
      timeout: 7s
      retries: 10
      start_period: 20s 

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - auction-network
    restart: unless-stopped

  category-service:
    build:
      context: ./category-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - SPRING_APPLICATION_NAME=category-service
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/category_service
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SERVER_PORT=8084
    depends_on:
      discovery-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - auction-network
    restart: unless-stopped
    
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_APPLICATION_NAME=user-service
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/user_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SERVER_PORT=8082
    depends_on:
      discovery-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - auction-network
    restart: unless-stopped

  auction-service:
    build:
      context: ./auction-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - spring.application.name=auction-service
      - eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/
      - spring.datasource.url=jdbc:mysql://mysql:3306/auction
      - spring.datasource.username=root
      - spring.datasource.password=123456
      - server.port=8083
      - cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
      - cloudinary.api-key=${CLOUDINARY_API_KEY}
      - cloudinary.api-secret=${CLOUDINARY_API_SECRET}
    depends_on:
      discovery-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - auction-network
    restart: unless-stopped

  bid-service:
    build:
      context: ./bid-service
      dockerfile: Dockerfile
    ports:
      - "8085:8085"
    environment:
      - SPRING_APPLICATION_NAME=bidding-service
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-service:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/bidding_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SERVER_PORT=8085
    depends_on:
      discovery-service:
        condition: service_healthy
      mysql:
        condition: service_healthy
    networks:
      - auction-network
    restart: unless-stopped

networks:
  auction-network: {}

volumes:
  mysql-data: {}