# Server Configuration
server.port=8086
spring.application.name=payment-service

# Database Configuration
spring.datasource.url=jdbc:mysql://mysql:3306/payment_service
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Eureka Configuration
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# PayPal Configuration (Sandbox)
paypal.client.id=${PAYPAL_CLIENT_ID}
paypal.client.secret=${PAYPAL_CLIENT_SECRET}
paypal.base.url=${PAYPAL_BASE_URL:https://api.sandbox.paypal.com}
paypal.currency=${PAYPAL_CURRENCY:USD}

# PayPal URLs
paypal.success.url=${PAYPAL_SUCCESS_URL:http://localhost:8080/api/payment/success:https://localhost:8080/api/payment/success}
paypal.cancel.url=${PAYPAL_CANCEL_URL:http://localhost:8080/api/payment/cancel:https://localhost:8080/api/payment/cancel}

# Logging
logging.level.com.example.payment=DEBUG
logging.level.com.paypal=DEBUG

# Swagger UI path
#springdoc.swagger-ui.path=/swagger-ui.html
