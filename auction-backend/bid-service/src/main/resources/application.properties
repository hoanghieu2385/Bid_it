server.port=8085
spring.application.name=bid-service

# Eureka Client
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# MySQL datasource
spring.datasource.url=jdbc:mysql://mysql:3306/bid_service
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# WebSocket Configuration
app.websocket.endpoint=/ws
app.websocket.topic=/topic/bids
app.websocket.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://10.0.2.2:3000,http://10.0.2.2

# Logging
logging.level.com.bidit.bidservice=DEBUG
logging.level.org.springframework.web.socket=DEBUG
logging.level.org.springframework.messaging=DEBUG

# Management endpoints for health check
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always


