# Server port
server.port=8080

# Application name
spring.application.name=api-gateway

# Spring Cloud Gateway discovery locator
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Spring Cloud Gateway routes
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

# spring.cloud.gateway.routes[1].id=category-service
# spring.cloud.gateway.routes[1].uri=lb://CATEGORY-SERVICE
# spring.cloud.gateway.routes[1].predicates[0]=Path=/api/categories/**

spring.cloud.gateway.routes[1].id=category-service
spring.cloud.gateway.routes[1].uri=lb://category-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/categories/**

spring.cloud.gateway.routes[2].id=auction-service
spring.cloud.gateway.routes[2].uri=lb://AUCTION-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/auctions/**

# Eureka client configuration
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
