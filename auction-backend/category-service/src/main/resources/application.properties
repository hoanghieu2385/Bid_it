# Application name (register with Eureka)
spring.application.name=category-service

# DataSource configuration
spring.datasource.url=jdbc:mysql://mysql:3306/category_service?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Enable Hibernate to automatically create/update the database schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Limit: Run data.sql only after Hibernate has created/updated the tables
spring.jpa.defer-datasource-initialization=true

# Required: Always execute initialization scripts (schema.sql & data.sql) for all DataSources
spring.sql.init.mode=always

# Server port: set to 0 to use a random port (Eureka will forward correctly)
server.port=0

# Eureka Client configuration
# Default Zone URL for Eureka Server registration
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka/
# Register this service with Eureka
eureka.client.register-with-eureka=true
# Fetch the registry from Eureka Server
eureka.client.fetch-registry=true